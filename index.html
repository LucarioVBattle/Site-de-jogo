<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Center</title>

<style>
body{
    margin:0;
    background:#121212;
    color:white;
    font-family:Arial;
    text-align:center;
}

header{
    background:#1e1e1e;
    padding:20px;
    font-size:30px;
}

.menu{
    margin:20px;
}

button{
    padding:12px 25px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.tela{
    display:none;
    padding:20px;
}

.ativa{
    display:block;
}

#board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:5px;
    justify-content:center;
    margin-top:20px;
}

.casa{
    width:100px;
    height:100px;
    background:#333;
    font-size:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

input{
    padding:10px;
    font-size:18px;
}
</style>
</head>

<body>

<header>🎮 Mini Game Center</header>

<div class="menu">
<button onclick="abrir('inicio')">Início</button>
<button onclick="abrir('numero')">Adivinhe</button>
<button onclick="abrir('velha')">Jogo da Velha</button>
<button onclick="abrir('moeda')">Cara ou Coroa</button>
</div>

<div id="inicio" class="tela ativa">
<h2>Escolha um jogo acima.</h2>
</div>

<div id="numero" class="tela">
<h2>Adivinhe o Número</h2>

<p>Entre 1 e 100</p>

<input id="palpite" type="number">

<button onclick="jogarNumero()">Tentar</button>

<p id="resultadoNumero"></p>
</div>

<div id="velha" class="tela">
<h2>Jogo da Velha</h2>

<div id="board"></div>

<p id="status"></p>

<button onclick="reiniciarVelha()">Reiniciar</button>
</div>

<div id="moeda" class="tela">

<h2>Cara ou Coroa</h2>

<button onclick="moeda('Cara')">Cara</button>
<button onclick="moeda('Coroa')">Coroa</button>

<h2 id="resultadoMoeda"></h2>

</div>

<script>

function abrir(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));

document.getElementById(id).classList.add("ativa");

}

//-----------------------------
// Adivinhe

let numero=Math.floor(Math.random()*100)+1;

function jogarNumero(){

let p=Number(document.getElementById("palpite").value);

let r=document.getElementById("resultadoNumero");

if(p==numero){

r.innerHTML="🎉 Você acertou!";

numero=Math.floor(Math.random()*100)+1;

}else if(p<numero){

r.innerHTML="Maior.";

}else{

r.innerHTML="Menor.";

}

}

//-----------------------------
// Cara ou Coroa

function moeda(escolha){

let sorte=Math.random()<0.5?"Cara":"Coroa";

if(escolha==sorte){

resultadoMoeda.innerHTML="✅ Deu "+sorte+"<br>Você venceu!";

}else{

resultadoMoeda.innerHTML="❌ Deu "+sorte+"<br>Você perdeu.";

}

}

//-----------------------------
// Jogo da Velha

let jogador="X";

let casas=["","","","","","","","",""];

const board=document.getElementById("board");

function criar(){

board.innerHTML="";

casas.forEach((v,i)=>{

let c=document.createElement("div");

c.className="casa";

c.innerHTML=v;

c.onclick=()=>clicar(i);

board.appendChild(c);

});

}

function clicar(i){

if(casas[i]!="") return;

casas[i]=jogador;

jogador=jogador=="X"?"O":"X";

criar();

verificar();

}

function verificar(){

const w=[

[0,1,2],

[3,4,5],

[6,7,8],

[0,3,6],

[1,4,7],

[2,5,8],

[0,4,8],

[2,4,6]

];

for(let a of w){

let[x,y,z]=a;

if(casas[x] && casas[x]==casas[y] && casas[y]==casas[z]){

status.innerHTML="🏆 "+casas[x]+" venceu!";

board.style.pointerEvents="none";

return;

}

}

}

function reiniciarVelha(){

casas=["","","","","","","","",""];

jogador="X";

status.innerHTML="";

board.style.pointerEvents="auto";

criar();

}

criar();

</script>

</body>
</html>
