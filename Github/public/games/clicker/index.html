<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { text-align: center; font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        button { font-size: 1.5rem; padding: 15px 30px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #timer { font-weight: bold; color: red; }
    </style>
</head>
<body>
    <h3>Clique rápido!</h3>
    <p>Tempo restante: <span id="timer">5</span>s</p>
    <h1 id="score-display">Cliques: 0</h1>
    <button id="click-btn" onclick="computarClique()">CLIQUE AQUI</button>

    <script>
        let cliques = 0;
        let tempo = 5;
        let jogoAtivo = true;

        const intervalo = setInterval(() => {
            tempo--;
            document.getElementById('timer').innerText = tempo;
            
            if (tempo <= 0) {
                clearInterval(intervalo);
                jogoAtivo = false;
                document.getElementById('click-btn').disabled = true;
                
                // COMUNICAÇÃO CRUCIAL: Envia o resultado para a plataforma pai
                window.parent.postMessage({ type: 'GAME_OVER', score: cliques }, '*');
            }
        }, 1000);

        function computarClique() {
            if (!jogoAtivo) return;
            cliques++;
            document.getElementById('score-display').innerText = `Cliques: ${cliques}`;
        }
    </script>
</body>
</html>
